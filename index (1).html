<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskly — To-Do App</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="app-wrapper">

    <header class="app-header">
      <div class="header-inner">
        <h1 class="logo">Taskly</h1>
        <p class="tagline">Clear your head. One task at a time.</p>
      </div>
      <div class="progress-ring-wrap">
        <svg class="progress-ring" viewBox="0 0 80 80">
          <circle class="ring-bg" cx="40" cy="40" r="32" />
          <circle class="ring-fill" id="progressCircle" cx="40" cy="40" r="32" />
        </svg>
        <span class="progress-label" id="progressLabel">0%</span>
      </div>
    </header>

    <main class="app-main">

      <!-- Add Task -->
      <div class="add-task-bar">
        <input
          type="text"
          id="taskInput"
          class="task-input"
          placeholder="Add a new task…"
          maxlength="120"
          autocomplete="off"
        />
        <select id="categorySelect" class="category-select">
          <option value="personal">Personal</option>
          <option value="work">Work</option>
          <option value="health">Health</option>
          <option value="learning">Learning</option>
        </select>
        <button id="addBtn" class="add-btn" aria-label="Add task">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
          Add
        </button>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Done</button>
        <span class="spacer"></span>
        <button id="clearCompletedBtn" class="clear-btn">Clear done</button>
      </div>

      <!-- Task List -->
      <ul id="taskList" class="task-list" aria-label="Task list"></ul>

      <!-- Empty State -->
      <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon">✦</div>
        <p class="empty-title">Nothing here yet.</p>
        <p class="empty-sub">Add a task above to get started.</p>
      </div>

      <!-- Stats Bar -->
      <div class="stats-bar" id="statsBar">
        <span id="statsText">0 tasks</span>
      </div>

    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
